<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Playlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13151a;
      --border: #1f2230;
      --accent: #c9a96e;
      --accent2: #7b6dab;
      --text: #e8e4da;
      --muted: #5a5870;
      --active-bg: #181b25;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(123,109,171,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(201,169,110,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 24px 80px;
    }

    /* Header */
    header {
      margin-bottom: 56px;
      text-align: center;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 6vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* Now playing bar */
    .now-playing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 32px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .now-playing::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent2), var(--accent));
    }

    .np-meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .vinyl {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: conic-gradient(
        #1a1c24 0deg, #222430 45deg, #1a1c24 90deg,
        #222430 135deg, #1a1c24 180deg, #222430 225deg,
        #1a1c24 270deg, #222430 315deg, #1a1c24 360deg
      );
      position: relative;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .vinyl::after {
      content: '';
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px #1a1c24, 0 0 0 5px var(--border);
    }

    .vinyl.spinning {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .np-info {
      flex: 1;
      min-width: 0;
    }

    .np-track {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.4rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-status {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
    }

    .np-status.active {
      color: var(--accent);
    }

    /* Progress */
    .progress-wrap {
      margin-top: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      appearance: none;
      -webkit-appearance: none;
    }

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      margin-top: -4px;
    }

    .progress-bar::-webkit-slider-runnable-track {
      height: 2px;
      background: linear-gradient(to right, var(--accent) var(--val, 0%), var(--border) var(--val, 0%));
      border-radius: 2px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 22px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: color 0.2s, background 0.2s;
      font-size: 13px;
    }

    .ctrl-btn:hover {
      color: var(--text);
      background: var(--border);
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 16px;
    }

    .play-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .vol-icon {
      color: var(--muted);
      font-size: 13px;
      flex-shrink: 0;
    }

    .vol-slider {
      flex: 1;
      height: 2px;
      background: var(--border);
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
    }

    /* Track list */
    .tracklist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .tracklist-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .track-count {
      font-size: 10px;
      color: var(--muted);
    }

    .tracklist {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      position: relative;
      background: transparent;
    }

    .track-item:hover {
      background: var(--surface);
      border-color: var(--border);
    }

    .track-item.active {
      background: var(--active-bg);
      border-color: var(--border);
    }

    .track-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--accent);
      border-radius: 2px 0 0 2px;
    }

    .track-num {
      font-size: 11px;
      color: var(--muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .track-item.active .track-num {
      color: var(--accent);
    }

    /* Equalizer bars */
    .eq-bars {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 14px;
      width: 20px;
    }

    .track-item.active.playing .eq-bars {
      display: flex;
    }

    .track-item.active.playing .track-num {
      display: none;
    }

    .eq-bars span {
      display: block;
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
      animation: eq 0.8s ease-in-out infinite alternate;
    }

    .eq-bars span:nth-child(1) { animation-delay: 0s; height: 6px; }
    .eq-bars span:nth-child(2) { animation-delay: 0.15s; height: 12px; }
    .eq-bars span:nth-child(3) { animation-delay: 0.3s; height: 8px; }
    .eq-bars span:nth-child(4) { animation-delay: 0.45s; height: 14px; }

    @keyframes eq {
      from { transform: scaleY(0.3); }
      to { transform: scaleY(1); }
    }

    .track-name {
      flex: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .track-item.active .track-name {
      color: var(--accent);
    }

    .track-file {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .play-track-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.18s;
      flex-shrink: 0;
    }

    .play-track-btn:hover, .track-item.active .play-track-btn {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(201,169,110,0.08);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0 24px;
      opacity: 0.5;
    }

    /* SVG icons inline */
    svg { display: block; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <p class="label">Personal Collection</p>
    <h1>My <em>Playlist</em></h1>
    <p class="subtitle">8 tracks · press to play</p>
  </header>

  <!-- Now Playing -->
  <div class="now-playing">
    <div class="np-meta">
      <div class="vinyl" id="vinyl"></div>
      <div class="np-info">
        <div class="np-track" id="np-track">Select a track</div>
        <div class="np-status" id="np-status">idle</div>
      </div>
    </div>

    <div class="progress-wrap">
      <input type="range" class="progress-bar" id="progress" min="0" max="100" value="0" step="0.1"/>
      <div class="time-row">
        <span id="cur-time">0:00</span>
        <span id="dur-time">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause">
        <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <div class="volume-row">
      <span class="vol-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </span>
      <input type="range" class="vol-slider" id="volume" min="0" max="1" step="0.01" value="1"/>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Track List -->
  <div class="tracklist-header">
    <span class="tracklist-label">Tracks</span>
    <span class="track-count">8 songs</span>
  </div>

  <div class="tracklist" id="tracklist"></div>

</div>

<audio id="audio"></audio>

<script>
  const tracks = [
    { name: "Naadaniyan",       file: "naadaniyan.mp3" },
    { name: "Die with a Smile",  file: "smile.mp3"      },
    { name: "Runaway",        file: "runawawy.mp3"      },
    { name: "Anxiety",         file: "anixety.mp3"   },
    { name: "Cupid",   file: "cupid.mp3"    },
    { name: "Pal Pal",          file: "pal.mp3"       },
    { name: "BLoodline", file: "blood.mp3"      },
    { name: "Attention",          file: "attetion.mp3"        },
    { name: "Dracuala",       file: "dracual.mp3" },
    { name: "Unholy",       file: "unholy.mp3" },
];
  

  const audio       = document.getElementById('audio');
  const vinyl       = document.getElementById('vinyl');
  const npTrack     = document.getElementById('np-track');
  const npStatus    = document.getElementById('np-status');
  const progress    = document.getElementById('progress');
  const curTime     = document.getElementById('cur-time');
  const durTime     = document.getElementById('dur-time');
  const btnPlay     = document.getElementById('btn-play');
  const iconPlay    = document.getElementById('icon-play');
  const iconPause   = document.getElementById('icon-pause');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const volSlider   = document.getElementById('volume');
  const tracklist   = document.getElementById('tracklist');

  let current = -1;
  let isPlaying = false;

  // Build track list
  tracks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'track-item';
    item.dataset.index = i;
    item.innerHTML = `
      <div class="eq-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="track-num">${String(i+1).padStart(2,'0')}</span>
      <div class="track-name">${t.name}</div>
      <span class="track-file">${t.file}</span>
      <button class="play-track-btn" title="Play ${t.name}">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
    `;
    item.addEventListener('click', () => loadTrack(i, true));
    tracklist.appendChild(item);
  });

  function getItem(i) {
    return tracklist.querySelectorAll('.track-item')[i];
  }

  function fmt(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function loadTrack(index, autoplay = false) {
    // Clear old active
    if (current >= 0) {
      const old = getItem(current);
      old.classList.remove('active', 'playing');
    }

    current = index;
    const t = tracks[index];
    audio.src = t.file;
    npTrack.textContent = t.name;

    const item = getItem(index);
    item.classList.add('active');

    if (autoplay) {
      audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
    } else {
      setPlaying(false);
    }
  }

  function setPlaying(state) {
    isPlaying = state;
    iconPlay.style.display  = state ? 'none' : 'block';
    iconPause.style.display = state ? 'block' : 'none';
    npStatus.textContent    = state ? '▶ now playing' : '⏸ paused';
    npStatus.classList.toggle('active', state);

    if (state) {
      vinyl.classList.add('spinning');
    } else {
      vinyl.classList.remove('spinning');
    }

    if (current >= 0) {
      const item = getItem(current);
      item.classList.toggle('playing', state);
    }
  }

  btnPlay.addEventListener('click', () => {
    if (current < 0) { loadTrack(0, true); return; }
    if (isPlaying) {
      audio.pause();
      setPlaying(false);
    } else {
      audio.play().then(() => setPlaying(true));
    }
  });

  btnPrev.addEventListener('click', () => {
    if (current <= 0) loadTrack(tracks.length - 1, isPlaying);
    else loadTrack(current - 1, isPlaying);
  });

  btnNext.addEventListener('click', () => {
    if (current >= tracks.length - 1) loadTrack(0, isPlaying);
    else loadTrack(current + 1, isPlaying);
  });

  audio.addEventListener('ended', () => {
    if (current < tracks.length - 1) loadTrack(current + 1, true);
    else { setPlaying(false); }
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progress.value = pct;
    progress.style.setProperty('--val', pct + '%');
    curTime.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    durTime.textContent = fmt(audio.duration);
  });

  progress.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  volSlider.addEventListener('input', () => {
    audio.volume = volSlider.value;
  });
</script>
</body>
</html>
